version: "3.9"

services:

  mysql:
    image: mysql:8.4
    container_name: serviceflow_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: serviceflow
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: serviceflow_redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    container_name: serviceflow_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  adminer:
    image: adminer
    container_name: serviceflow_adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  mysql_data:
